<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Almaty DataLab</title>
    <script src="https://api-maps.yandex.ru/2.1/?apikey=ВАШ_API_КЛЮЧ&lang=ru_RU" type="text/javascript"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --panel: #f4f6f8;
            --text: #111827;
            --border: #e5e7eb;
            --accent: #3b82f6;
            --lvl-1: #10b981;
            --lvl-2: #84cc16;
            --lvl-3: #f59e0b;
            --lvl-4: #f97316;
            --lvl-5: #ef4444;
            --header-h: 56px;
            --footer-h: 68px;
            --drawer-peek: 120px; /* how much drawer peeks above footer */
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        [data-theme="dark"] {
            --bg: #0b0f19;
            --panel: #111827;
            --text: #f3f4f6;
            --border: #1f2937;
            --accent: #60a5fa;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body, html {
            margin: 0;
            font-family: 'Manrope', sans-serif;
            height: 100%;
            background: var(--bg);
            color: var(--text);
            transition: background 0.2s, color 0.2s;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* ─── HEADER ─── */
        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            height: var(--header-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .logo { font-weight: 800; font-size: 18px; letter-spacing: -0.5px; white-space: nowrap; }
        .logo span { color: var(--accent); }

        /* Tabs — full text on desktop, icons on mobile */
        .tabs {
            display: flex;
            background: var(--bg);
            padding: 3px;
            border-radius: 10px;
            border: 1px solid var(--border);
            gap: 2px;
        }
        .tabs button {
            background: transparent;
            border: none;
            padding: 7px 14px;
            cursor: pointer;
            border-radius: 7px;
            font-weight: 700;
            color: var(--text);
            font-size: 13px;
            font-family: 'Manrope', sans-serif;
            white-space: nowrap;
            transition: background 0.15s, color 0.15s, box-shadow 0.15s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .tabs button .tab-text { display: inline; }
        .tabs button.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 3px 10px rgba(59, 130, 246, 0.35);
        }

        .theme-btn {
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 7px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            line-height: 1;
            flex-shrink: 0;
        }

        /* ─── MAP ─── */
        #map {
            position: fixed;
            top: var(--header-h);
            left: 0; right: 0;
            /* bottom adjusts depending on drawer state */
            bottom: calc(var(--footer-h) + var(--drawer-peek) + var(--safe-bottom));
            transition: bottom 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1;
        }
        #map.map-collapsed {
            bottom: calc(var(--footer-h) + var(--safe-bottom) + 70vh);
        }

        /* ─── DRAWER ─── */
        #drawer {
            position: fixed;
            left: 0; right: 0;
            bottom: calc(var(--footer-h) + var(--safe-bottom));
            height: calc(100vh - var(--header-h) - var(--footer-h) - var(--safe-bottom));
            background: var(--bg);
            border-top: 1px solid var(--border);
            border-radius: 20px 20px 0 0;
            z-index: 50;
            transform: translateY(calc(100% - var(--drawer-peek)));
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            box-shadow: 0 -4px 24px rgba(0,0,0,0.12);
        }
        #drawer.open {
            transform: translateY(0);
        }

        .drawer-handle-area {
            padding: 12px 0 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            flex-shrink: 0;
            gap: 6px;
        }
        .drawer-handle {
            width: 36px; height: 4px;
            background: var(--border);
            border-radius: 2px;
        }
        .drawer-hint {
            font-size: 11px;
            font-weight: 700;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #drawer-content {
            flex: 1;
            overflow-y: auto;
            padding: 0 20px 24px;
            -webkit-overflow-scrolling: touch;
        }

        /* ─── SIDEBAR / DRAWER CONTENT ─── */
        .district-title { font-size: 22px; font-weight: 800; margin: 0 0 14px 0; }

        .legend {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
        }
        .leg-item { flex: 1; }

        .data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 14px;
        }
        .data-card {
            background: var(--panel);
            border-radius: 14px;
            padding: 14px;
            border: 1px solid var(--border);
        }
        .data-card.full { grid-column: 1 / -1; }

        .source-tag {
            font-size: 9px;
            text-transform: uppercase;
            font-weight: 800;
            padding: 3px 7px;
            border-radius: 5px;
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent);
            display: inline-block;
            margin-bottom: 8px;
        }
        .stat-value { font-size: 18px; font-weight: 800; margin-bottom: 2px; }
        .stat-label { font-size: 11px; color: #6b7280; font-weight: 500; }

        .ai-box {
            background: rgba(59, 130, 246, 0.05);
            padding: 16px;
            border-radius: 14px;
            border: 1px dashed var(--accent);
        }
        .ai-title {
            font-size: 10px;
            font-weight: 800;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        #ai-verdict { font-size: 13px; line-height: 1.6; }

        /* Placeholder */
        #placeholder h2 { font-size: 20px; font-weight: 800; margin: 0 0 8px; }
        #placeholder p { color: #6b7280; line-height: 1.5; font-size: 13px; margin: 0 0 12px; }

        .hidden { display: none !important; }

        /* ─── AI FOOTER ─── */
        #ai-footer {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: calc(var(--footer-h) + var(--safe-bottom));
            padding: 0 12px var(--safe-bottom);
            background: var(--panel);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 200;
        }

        .ai-avatar {
            width: 36px; height: 36px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            font-size: 12px;
            flex-shrink: 0;
        }

        #ai-input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 24px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            outline: none;
            font-family: 'Manrope', sans-serif;
            font-size: 14px;
            min-width: 0;
            /* Prevent iOS zoom on focus */
            font-size: 16px;
        }

        .ai-btn {
            background: var(--accent);
            color: white;
            border: none;
            width: 44px; height: 44px;
            border-radius: 50%;
            font-weight: 800;
            cursor: pointer;
            font-family: 'Manrope', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 18px;
            transition: transform 0.1s, opacity 0.1s;
        }
        .ai-btn:active { transform: scale(0.92); opacity: 0.85; }

        /* ─── DESKTOP LAYOUT (≥768px) ─── */
        @media (min-width: 768px) {
            :root {
                --header-h: 64px;
                --footer-h: 90px;
                --drawer-peek: 0px;
            }

            /* Reset mobile positioning */
            #map {
                position: absolute;
                top: var(--header-h);
                left: 0;
                right: 420px;
                bottom: var(--footer-h);
                transition: none;
            }

            #drawer {
                position: fixed;
                top: var(--header-h);
                right: 0;
                bottom: var(--footer-h);
                left: auto;
                width: 420px;
                height: auto;
                border-top: none;
                border-left: 1px solid var(--border);
                border-radius: 0;
                transform: none !important;
                box-shadow: none;
            }

            .drawer-handle-area { display: none; }
            #drawer-content { padding: 24px; }

            header { padding: 0 32px; }
            .logo { font-size: 22px; }
            .tabs button { padding: 10px 20px; font-size: 14px; }
            .tabs button .tab-text { display: inline; }

            #ai-footer { padding: 0 32px; height: var(--footer-h); }
            #ai-input { font-size: 14px; padding: 14px 24px; border-radius: 30px; }
            .ai-btn { width: auto; height: auto; border-radius: 30px; padding: 14px 28px; font-size: 14px; }

            .district-title { font-size: 28px; }
            .stat-value { font-size: 22px; }
        }

        /* ─── MOBILE: hide tab text, show only icons ─── */
        @media (max-width: 480px) {
            .tabs button .tab-text { display: none; }
            .tabs button { padding: 7px 10px; font-size: 16px; }
            .logo { font-size: 16px; }
        }
    </style>
</head>

    function init() {
        myMap = new ymaps.Map("map", { center: [43.23, 76.90], zoom: 11, controls: ['zoomControl'] });
        drawMap();
    }

    function drawMap() {
        myMap.geoObjects.removeAll();
        for (let key in coords) {
            let dataLvl = db[key][currentMode].lvl;
            let polyColor = colors[dataLvl];

            let poly = new ymaps.Polygon([coords[key]], { hintContent: db[key].name }, {
                fillColor: polyColor + '66',
                strokeColor: polyColor,
                strokeWidth: 2,
                openBalloonOnClick: false
            });
            poly.events.add('click', () => {
                updateSidebar(key);
                if (isMobile()) openDrawer();
            });
            poly.events.add('mouseenter', (e) => e.get('target').options.set('fillOpacity', 0.8));
            poly.events.add('mouseleave', (e) => e.get('target').options.set('fillOpacity', 0.4));

            myMap.geoObjects.add(poly);
        }
    }

    function openDrawer() {
        drawerOpen = true;
        document.getElementById('drawer').classList.add('open');
        document.getElementById('map').classList.add('map-collapsed');
    }

    function closeDrawer() {
        drawerOpen = false;
        document.getElementById('drawer').classList.remove('open');
        document.getElementById('map').classList.remove('map-collapsed');
    }

    function toggleDrawer() {
        if (!isMobile()) return;
        drawerOpen ? closeDrawer() : openDrawer();
    }

    function updateSidebar(key) {
        document.getElementById('placeholder').classList.add('hidden');
        document.getElementById('content').classList.remove('hidden');

        const d = db[key];
        const m = d[currentMode];
        const l = labels[currentMode];

        document.getElementById('d-name').innerText = d.name;
        document.getElementById('drawer-hint').innerText = d.name;

        document.getElementById('tag-1').innerText = l.t1;
        document.getElementById('lbl-1').innerText = l.l1;
        document.getElementById('val-1').innerText = m.v1;

        document.getElementById('tag-2').innerText = l.t2;
        document.getElementById('lbl-2').innerText = l.l2;
        document.getElementById('val-2').innerText = m.v2;

        document.getElementById('ai-verdict').innerText = m.ai;
    }

    function setMode(mode, btn) {
        currentMode = mode;
        document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('placeholder').classList.remove('hidden');
        document.getElementById('content').classList.add('hidden');
        document.getElementById('drawer-hint').innerText = 'Выберите район';
        if (isMobile()) closeDrawer();
        drawMap();
    }

    function toggleTheme() {
        const body = document.body;
        body.setAttribute('data-theme', body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }

    async function askAi() {
        const inputEl = document.getElementById('ai-input');
        const message = inputEl.value.trim();
        if (!message) return;

        const lowerMsg = message.toLowerCase();

        let foundKey = null;
        for (let word in districtMap) {
            if (lowerMsg.includes(word)) {
                foundKey = districtMap[word];
                break;
            }
        }

        if (foundKey) {
            updateSidebar(foundKey);
            if (isMobile()) openDrawer();
            inputEl.value = '';
            return;
        }

        document.getElementById('placeholder').classList.add('hidden');
        document.getElementById('content').classList.remove('hidden');
        document.getElementById('d-name').innerText = '⏳ Анализирую...';
        document.getElementById('drawer-hint').innerText = 'ИИ думает...';
        document.getElementById('ai-verdict').innerText = message;
        document.getElementById('val-1').innerText = '—';
        document.getElementById('val-2').innerText = '—';
        inputEl.value = '';
        if (isMobile()) openDrawer();

        try {
            const response = await fetch("http://localhost:5000/ai", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message })
            });

            const data = await response.json();
            document.getElementById('d-name').innerText = '⚡ ИИ-Ответ';
            document.getElementById('drawer-hint').innerText = 'ИИ-Ответ';
            document.getElementById('ai-verdict').innerText = data.answer;

        } catch (error) {
            document.getElementById('d-name').innerText = '❌ Ошибка';
            document.getElementById('drawer-hint').innerText = 'Ошибка';
            document.getElementById('ai-verdict').innerText = 'Не удалось подключиться к серверу. Убедись, что Flask запущен.';
        }
    }

    document.getElementById('ai-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') askAi();
    });

    /* Close drawer on map tap (outside drawer) on mobile */
    document.getElementById('map').addEventListener('click', function() {
        if (isMobile() && drawerOpen) closeDrawer();
    });
</script>

</body>
</html>
